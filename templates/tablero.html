<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Tablero de OTs · La Santaniana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --rojo: #C81E37;
      --azul: #1E5A96;
      --bg: #0f172a;
      --card: #1e293b;
      --texto: #f1f5f9;
      --muted: #94a3b8;
      --abierta: #ef4444;
      --proceso: #f59e0b;
      --espera: #f59e0b;
      --presup: #3b82f6;
      --camino: #f97316;
      --entregado: #22c55e;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--texto);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #contenido { flex: 1; overflow: hidden; }

    /* Encabezado */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: linear-gradient(135deg, var(--azul) 0%, #16447a 100%);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 18px; }
    .logo-box {
      background: #fff;
      border-radius: 12px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .logo-box img {
      height: 44px;
      width: auto;
      display: block;
    }
    .header h1 { font-size: 26px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 24px; }
    .reloj { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .actualizado { font-size: 14px; color: rgba(255,255,255,0.7); }
    .btn-full {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 52px;
      height: 52px;
      border-radius: 12px;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn-full:hover { background: rgba(255,255,255,0.28); }

    /* Grilla de tarjetas */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 22px;
      padding: 26px 32px;
    }

    /* Tarjeta de OT */
    .ot-card {
      background: var(--card);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
      border-left: 8px solid var(--muted);
      animation: aparecer 0.4s ease;
    }
    @keyframes aparecer { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .ot-card.abierta { border-left-color: var(--abierta); }
    .ot-card.en_proceso { border-left-color: var(--proceso); }

    .ot-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 22px 12px;
    }
    .coche-num {
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -1px;
      color: #fff;
    }
    .coche-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .ot-id {
      background: rgba(255,255,255,0.1);
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--muted);
    }
    .patente-chip {
      font-size: 14px;
      color: var(--muted);
      padding: 0 22px;
      margin-bottom: 12px;
    }

    /* Badges de estado */
    .estados { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 22px 18px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }
    .badge i { font-size: 18px; }
    .badge.abierta { background: var(--abierta); }
    .badge.en_proceso { background: var(--proceso); }
    .badge.espera { background: var(--espera); }
    .badge.presupuestado { background: var(--presup); }
    .badge.en_camino { background: var(--camino); }
    .badge.entregado { background: var(--entregado); }

    /* Progreso de items */
    .progreso {
      padding: 14px 22px 20px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .progreso-texto { font-size: 14px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .barra { height: 12px; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; }
    .barra-fill { height: 100%; background: var(--entregado); border-radius: 6px; transition: width 0.5s; }

    /* Sin OTs */
    .vacio {
      text-align: center;
      padding: 100px 20px;
      color: var(--muted);
    }
    .vacio i { font-size: 90px; opacity: 0.3; margin-bottom: 20px; display: block; }
    .vacio h2 { font-size: 32px; font-weight: 600; }

    /* Pie con leyenda */
    .leyenda {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 32px;
      background: var(--card);
      position: sticky;
      bottom: 0;
      border-top: 2px solid rgba(255,255,255,0.08);
    }
    .ley-grupo { display: flex; flex-wrap: wrap; gap: 20px; }
    .ley-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--muted); }
    .ley-dot { width: 16px; height: 16px; border-radius: 4px; }

    /* Paginador de tandas */
    .paginador { display: flex; align-items: center; gap: 8px; }
    .pag-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s, transform 0.3s;
    }
    .pag-dot.activo { background: var(--entregado); transform: scale(1.3); }
    .pag-texto { font-size: 15px; color: var(--texto); font-weight: 600; margin-left: 10px; }

    /* Responsive para tele grande */
    @media (min-width: 1600px) {
      .grid { grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 26px; }
      .coche-num { font-size: 60px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo-box"><img src="/static/logo.png?v=2" alt="La Santaniana"></div>
      <h1>Estado de Órdenes de Trabajo</h1>
    </div>
    <div class="header-right">
      <div class="reloj" id="reloj">--:--:--</div>
      <button class="btn-full" onclick="toggleFull()" title="Pantalla completa"><i class="ti ti-maximize"></i></button>
    </div>
  </div>

  <div id="contenido">
    <div class="vacio"><i class="ti ti-loader"></i><h2>Cargando...</h2></div>
  </div>

  <div class="leyenda">
    <div id="paginador" class="paginador"></div>
    <div class="ley-grupo">
      <div class="ley-item"><span class="ley-dot" style="background:var(--abierta)"></span> Abierta</div>
      <div class="ley-item"><span class="ley-dot" style="background:var(--proceso)"></span> En proceso</div>
      <div class="ley-item"><span class="ley-dot" style="background:var(--presup)"></span> Presupuestado</div>
      <div class="ley-item"><span class="ley-dot" style="background:var(--camino)"></span> En camino</div>
      <div class="ley-item"><span class="ley-dot" style="background:var(--entregado)"></span> Entregado</div>
    </div>
  </div>

  <script>
    const LABEL_ESTADO = { abierta: "Abierta", en_proceso: "En proceso", cerrada: "Cerrada" };
    const ICONO_ESTADO = { abierta: "ti-alert-circle", en_proceso: "ti-tool", cerrada: "ti-circle-check" };
    const LABEL_COMPRAS = { en_espera: "En espera", presupuestado: "Presupuestado", en_camino: "En camino", entregado: "Entregado" };
    const ICONO_COMPRAS = { en_espera: "ti-clock", presupuestado: "ti-cash", en_camino: "ti-truck-delivery", entregado: "ti-package" };
    const CLASE_COMPRAS = { en_espera: "espera", presupuestado: "presupuestado", en_camino: "en_camino", entregado: "entregado" };

    function reloj() {
      const ahora = new Date();
      document.getElementById("reloj").textContent = ahora.toLocaleTimeString("es-PY", { hour12: false });
    }
    setInterval(reloj, 1000); reloj();

    function toggleFull() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen();
      }
    }

    function tarjeta(o) {
      const coche = o.n_interno || "S/N";
      const total = o.total_items || 0;
      const compl = o.items_completados || 0;
      const pct = total > 0 ? Math.round((compl / total) * 100) : 0;

      // Badge del estado del taller
      let badges = `<span class="badge ${o.estado}"><i class="ti ${ICONO_ESTADO[o.estado]}"></i> ${LABEL_ESTADO[o.estado] || o.estado}</span>`;
      // Badge del estado de compras (si está en el circuito)
      if (o.estado_compras) {
        const cls = CLASE_COMPRAS[o.estado_compras] || "espera";
        badges += `<span class="badge ${cls}"><i class="ti ${ICONO_COMPRAS[o.estado_compras]}"></i> ${LABEL_COMPRAS[o.estado_compras] || o.estado_compras}</span>`;
      }

      return `
        <div class="ot-card ${o.estado}">
          <div class="ot-top">
            <div>
              <div class="coche-label">Coche</div>
              <div class="coche-num">${coche}</div>
            </div>
            <div class="ot-id">OT #${o.id}</div>
          </div>
          <div class="patente-chip"><i class="ti ti-license"></i> ${o.patente || ""} · ${o.marca || ""}</div>
          <div class="estados">${badges}</div>
          <div class="progreso">
            <div class="progreso-texto"><span>Trabajos completados</span><span>${compl}/${total}</span></div>
            <div class="barra"><div class="barra-fill" style="width:${pct}%"></div></div>
          </div>
        </div>`;
    }

    // ─── Estado del tablero ───
    let todasLasOts = [];      // todas las OTs activas
    let paginas = [];          // OTs divididas en tandas (si no entran todas)
    let paginaActual = 0;
    let timerRotacion = null;

    // Mide cuántas tarjetas entran en la pantalla (sin scroll) y arma las tandas
    function armarPaginas() {
      const cont = document.getElementById("contenido");
      // Render temporal de todas para medir
      cont.innerHTML = `<div class="grid" id="grid-medida">${todasLasOts.map(tarjeta).join("")}</div>`;
      const grid = document.getElementById("grid-medida");
      const tarjetas = Array.from(grid.children);
      if (tarjetas.length === 0) { paginas = []; return; }

      // Altura disponible: viewport menos header y leyenda
      const header = document.querySelector(".header").offsetHeight;
      const leyenda = document.querySelector(".leyenda").offsetHeight;
      const dispo = window.innerHeight - header - leyenda - 20;

      // ¿Cuántas tarjetas entran completas en esa altura?
      let cabenTodas = true;
      for (const t of tarjetas) {
        if (t.offsetTop + t.offsetHeight > dispo) { cabenTodas = false; break; }
      }

      if (cabenTodas) {
        // Entran todas → una sola página, sin rotación
        paginas = [todasLasOts];
      } else {
        // No entran → dividir en tandas según cuántas filas caben
        const primeraFila = tarjetas[0].offsetTop;
        const colsPorFila = tarjetas.filter(t => t.offsetTop === primeraFila).length;
        // Cuántas filas caben en la altura disponible
        const altoTarjeta = tarjetas[0].offsetHeight + 22; // + gap
        const filasCaben = Math.max(1, Math.floor(dispo / altoTarjeta));
        const porPagina = Math.max(1, colsPorFila * filasCaben);
        paginas = [];
        for (let i = 0; i < todasLasOts.length; i += porPagina) {
          paginas.push(todasLasOts.slice(i, i + porPagina));
        }
      }
    }

    // Muestra la página actual
    function mostrarPagina() {
      const cont = document.getElementById("contenido");
      if (paginas.length === 0) {
        cont.innerHTML = `<div class="vacio"><i class="ti ti-checkup-list"></i><h2>No hay órdenes de trabajo activas</h2></div>`;
        document.getElementById("paginador").innerHTML = "";
        return;
      }
      if (paginaActual >= paginas.length) paginaActual = 0;
      const ots = paginas[paginaActual];
      cont.innerHTML = `<div class="grid">${ots.map(tarjeta).join("")}</div>`;

      // Indicador de tandas (solo si hay más de una)
      const pag = document.getElementById("paginador");
      if (paginas.length > 1) {
        pag.innerHTML = paginas.map((_, i) =>
          `<span class="pag-dot ${i === paginaActual ? 'activo' : ''}"></span>`).join("")
          + `<span class="pag-texto">Tanda ${paginaActual + 1} de ${paginas.length}</span>`;
      } else {
        pag.innerHTML = "";
      }
    }

    // Rotación automática entre tandas
    function iniciarRotacion() {
      if (timerRotacion) clearInterval(timerRotacion);
      if (paginas.length > 1) {
        timerRotacion = setInterval(() => {
          paginaActual = (paginaActual + 1) % paginas.length;
          mostrarPagina();
        }, 9000); // cambia de tanda cada 9 segundos
      }
    }

    async function cargar() {
      try {
        const resp = await fetch("/api/tablero", { headers: { "Cache-Control": "no-cache" } });
        const data = await resp.json();
        todasLasOts = data.ots || [];
        armarPaginas();
        // Si la página actual quedó fuera de rango tras actualizar, resetear
        if (paginaActual >= paginas.length) paginaActual = 0;
        mostrarPagina();
        iniciarRotacion();
      } catch (e) {
        console.error("Error al cargar el tablero:", e);
      }
    }

    cargar();
    // Refrescar los datos del servidor cada 15 segundos
    setInterval(cargar, 15000);
    // Si cambia el tamaño de la ventana (ej: entrar a pantalla completa), recalcular tandas
    window.addEventListener("resize", () => { armarPaginas(); mostrarPagina(); iniciarRotacion(); });
  </script>
</body>
</html>
