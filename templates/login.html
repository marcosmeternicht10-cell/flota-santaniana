<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — La Santaniana</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0A0F1A 0%, #16447A 100%);
      min-height: 100vh; display: grid; place-items: center; padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
    }
    .login-logo {
      width: 80px; height: 80px; margin: 0 auto 20px; border-radius: 18px;
      background: white; display: flex; align-items: center; justify-content: center;
      padding: 12px; box-shadow: 0 6px 20px rgba(220,38,65,0.25);
      border: 1px solid #eee;
    }
    .login-logo img { max-width: 100%; max-height: 100%; object-fit: contain; }
    h1 { font-size: 22px; text-align: center; color: #0F172A; margin-bottom: 4px; }
    .sub { text-align: center; color: #64748B; font-size: 13px; margin-bottom: 28px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12.5px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1px solid #E2E8F0; border-radius: 9px;
      font-size: 14px; transition: border 0.15s;
    }
    .field input:focus { outline: none; border-color: #1E5A96; box-shadow: 0 0 0 3px rgba(30,90,150,0.1); }
    .btn-login {
      width: 100%; padding: 12px; background: #1E5A96; color: #fff; border: none;
      border-radius: 9px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.15s; margin-top: 8px;
    }
    .btn-login:hover { background: #16447A; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #FEE2E5; color: #B91C32; padding: 10px 14px; border-radius: 9px;
      font-size: 13px; margin-bottom: 16px; display: none; align-items: center; gap: 8px;
    }
    .error.show { display: flex; }
    .foot { text-align: center; font-size: 11.5px; color: #94A3B8; margin-top: 22px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><img src="/static/logo.png" alt="La Santaniana"></div>
    <h1>La Santaniana</h1>
    <p class="sub">Sistema de Gestión de Flota</p>

    <div class="error" id="error"><i class="ti ti-alert-circle"></i> <span id="error-msg"></span></div>

    <form id="login-form">
      <div class="field">
        <label>Usuario</label>
        <input type="text" id="usuario" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btn">Ingresar</button>
    </form>

    <p class="foot">© 2026 La Santaniana · Gestión de Flota</p>
  </div>

  <script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error");
    const errorMsg = document.getElementById("error-msg");
    const btn = document.getElementById("btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.classList.remove("show");
      btn.disabled = true; btn.textContent = "Ingresando...";

      try {
        const r = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            usuario: document.getElementById("usuario").value,
            password: document.getElementById("password").value,
          })
        });
        const data = await r.json();
        if (data.ok) {
          window.location.href = "/";
        } else {
          errorMsg.textContent = data.msg || "Error al ingresar";
          errorBox.classList.add("show");
          btn.disabled = false; btn.textContent = "Ingresar";
        }
      } catch (err) {
        errorMsg.textContent = "Error de conexión";
        errorBox.classList.add("show");
        btn.disabled = false; btn.textContent = "Ingresar";
      }
    });
  </script>
</body>
</html>
